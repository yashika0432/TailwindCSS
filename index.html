<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="mt-20 mx-52 flex flex-wrap rounded border-2 rounded-lg">
      <div
        class="w-full bg-linear-to-t from-sky-500 to-indigo-500 text-white h-24 flex justify-center items-center font-bold text-xl rounded-t"
      >
        New you can trust.
      </div>
      <div class="text-center mt-6 w-full">
        <h3 class="text-lg font-semibold">Stay up to date with the latest!</h3>
        <p>
          Subscribe to our newsletter for the latest news straight into your
          inbox.
        </p>
        <form class="flex flex-wrap">
          <input
            class="w-full mx-52 bg-slate-200 text-center placeholder:text-sm mt-4 py-2 rounded"
            placeholder="your@email.com"
          />
          <button
            class="bg-blue-500 w-full text-white mx-52 mt-4 py-2 rounded-full"
          >
            Subscribe Now
          </button>
        </form>
        <p class="mx-6 mt-6 text-sm my-6">We value your privacy</p>
      </div>
    </div>
  </body>
</html>
